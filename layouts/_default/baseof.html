<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>

<body>
  <div id="scroll-progress" aria-hidden="true"></div>
  <a class="skip-link" href="#main-content">{{ i18n "skip_to_content" }}</a>
  {{ partial "header.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <button id="back-to-top" aria-label="{{ i18n "back_to_top" | default "Tornar al capdamunt" }}">
    <svg viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
      <circle class="btt-track" cx="22" cy="22" r="18"/>
      <circle id="btt-ring" class="btt-ring" cx="22" cy="22" r="18"
              data-c="113.097"
              style="stroke-dasharray:113.097;stroke-dashoffset:113.097"
              transform="rotate(-90 22 22)"/>
      <text class="btt-arrow" x="22" y="27">↑</text>
    </svg>
  </button>
  <script src="{{ "js/header.js" | relURL }}" defer></script>
  <script src="{{ "js/scroll-progress.js" | relURL }}" defer></script>
</body>
</html>
