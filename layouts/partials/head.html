<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>

<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<link rel="canonical" href="{{ .Permalink }}">

{{ if .Site.Params.noindex }}
<meta name="robots" content="noindex, nofollow">
{{ end }}

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

<!-- Hreflang per a multilingüe -->
{{ range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
{{ end }}
<link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}">

<!-- CSS -->
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ "img/favicon.svg" | relURL }}">

<!-- Analítica: GoatCounter (sense cookies, GDPR) -->
{{ if not .Site.Params.noindex }}
<script data-goatcounter="https://linuxbcn.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{{ end }}
